<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>強み・弱み診断テスト</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #FDF6EC 0%, #F4EFE3 100%);
    color: #2C2A26;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px;
  }
  #app {
    width: 100%;
    max-width: 480px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }

  /* ---- Cover ---- */
  .cover { text-align: center; padding: 36px 24px 28px; }
  .cover-emoji-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .cover-emoji-row span {
    font-size: 26px;
    background: #F4EFE3;
    border-radius: 50%;
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover-title {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: 0.02em;
  }
  .cover-sub {
    font-size: 14px;
    color: #7A7568;
    line-height: 1.7;
    margin: 0 0 24px;
  }
  .cover-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 28px;
  }
  .cover-meta div { text-align: center; }
  .cover-meta .num { font-size: 20px; font-weight: 700; color: #B5601F; }
  .cover-meta .lbl { font-size: 12px; color: #9A9484; }
  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: #2C2A26;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .start-btn:active { opacity: 0.85; transform: scale(0.99); }

  /* ---- Quiz ---- */
  .progress-label { font-size: 13px; color: #9A9484; margin-bottom: 8px; font-weight: 500; }
  .progress-bar { height: 8px; background: #F0EBDE; border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
  .progress-fill { height: 100%; background: #D9832B; border-radius: 6px; transition: width 0.25s ease; }
  .question { font-size: 17px; font-weight: 700; margin-bottom: 18px; line-height: 1.55; }
  button.option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 15px 16px;
    margin-bottom: 10px;
    border: 1.5px solid #ECE6D8;
    border-radius: 12px;
    background: #FDFBF6;
    font-size: 15px;
    color: #2C2A26;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, border-color 0.12s;
  }
  button.option:active { background: #F4EFE3; border-color: #D9832B; transform: scale(0.99); }

  /* ---- Result ---- */
  .result-card { border-radius: 16px; padding: 30px 16px 26px; text-align: center; margin-bottom: 22px; }
  .result-emoji { font-size: 52px; line-height: 1; margin-bottom: 10px; }
  .result-sub { font-size: 13px; opacity: 0.8; margin: 0 0 6px; font-weight: 500; }
  .result-name { font-size: 25px; font-weight: 700; margin: 0 0 3px; }
  .result-title { font-size: 15px; margin: 0; opacity: 0.9; }
  .section-label { font-size: 13px; color: #9A9484; margin: 18px 0 8px; font-weight: 600; }
  ul { margin: 0; padding-left: 20px; }
  li { margin-bottom: 6px; line-height: 1.6; }
  .advice-box {
    background: #FDF6EC;
    border-left: 3px solid #D9832B;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin: 0;
    line-height: 1.7;
    font-size: 14.5px;
  }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .score-label { width: 56px; font-size: 12px; color: #7A7568; flex-shrink: 0; }
  .score-track { flex: 1; height: 8px; background: #F0EBDE; border-radius: 6px; overflow: hidden; }
  .score-fill { height: 100%; background: #C9BFA8; border-radius: 6px; }
  .score-num { width: 20px; font-size: 12px; text-align: right; flex-shrink: 0; color: #7A7568; }
  .actions { margin-top: 24px; }
  .actions button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid #ECE6D8;
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    color: #2C2A26;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <div id="quiz-root"></div>
  </div>
</div>
<script>
const Q = [
["グループで作業するとき、あなたは","率先してリーダー役を引き受ける","全体の計画や進め方を考える","メンバーの意見をまとめる","新しいアイデアを提案する","地道な作業をコツコツ進める"],
["新しいプロジェクトが始まるとき、まず何をする?","とりあえず動き出す","情報収集して計画を立てる","関係者に相談する","面白そうなやり方を試す","スケジュールを細かく決める"],
["意見が対立したとき","自分の意見をはっきり主張する","データや根拠で判断する","両者の間を取り持とうとする","別の視点を提示する","じっくり時間をかけて解決策を探す"],
["締め切り前、あなたは","追い込まれるほど力を発揮する","早めに計画を立てて進める","周りと協力して分担する","直前でアイデアが変わることもある","コツコツ前倒しで進めている"],
["失敗したとき","すぐ切り替えて次に進む","原因を分析して改善する","周りに相談して励ましてもらう","あまり気にせず別の方法を試す","反省してじっくり立て直す"],
["褒められると嬉しいのは","「頼りになる」と言われること","「よく考えている」と言われること","「一緒にいて安心する」と言われること","「発想が面白い」と言われること","「真面目でコツコツしている」と言われること"],
["休日の過ごし方は","アクティブに予定を詰め込む","本を読んだり調べ物をする","友人とゆっくり過ごす","気分で自由に過ごす","家でルーティンをこなす"],
["苦手なのは","人の指示に従うこと","曖昧なまま進めること","自分の意見をはっきり言うこと","同じことを繰り返すこと","急な変化に対応すること"],
["チームで頼られるのは","決断すること","計画を立てること","場の雰囲気を和ませること","新しい発想を出すこと","最後までやり遂げること"],
["ストレスを感じるのは","物事が思い通りに進まないとき","準備不足で挑まないといけないとき","人間関係がぎくしゃくしているとき","同じ作業がずっと続くとき","予定が急に変わるとき"],
["買い物をするとき","直感でパッと決める","比較検討してから選ぶ","誰かに相談してから決める","気に入ったら勢いで買う","慎重に時間をかけて選ぶ"],
["会議での役割は","議論を引っ張る","論点を整理する","みんなの発言を引き出す","突飛なアイデアを出す","議事録や記録を丁寧に取る"],
["新しい環境に入ったとき","すぐに自分の居場所を作る","まず観察してから動く","周りに馴染もうと気を配る","楽しそうなことを見つけて動く","少しずつ慣れていく"],
["目標に向かうとき","大きな目標をまず掲げる","具体的な計画に落とし込む","仲間と一緒に頑張りたい","途中で目標が変わることもある","小さな目標を積み重ねる"],
["感情が高ぶったとき","すぐ言葉や行動に出る","一旦冷静になって考える","誰かに話を聞いてもらう","気分転換して忘れる","一人でじっくり抱え込む"],
["人からよく言われるのは","「頼もしい」「エネルギッシュ」","「冷静」「よく考えている」","「優しい」「聞き上手」","「面白い」「自由な発想」","「真面目」「粘り強い」"],
["計画が崩れたとき","力技で何とかする","冷静に再計画を立てる","周りと協力して立て直す","別の面白い方向に切り替える","焦らず一つずつ修正する"],
["あなたのモットーに近いのは","「まず行動」","「準備がすべて」","「みんなで」","「自由に楽しく」","「継続は力なり」"],
["苦手な状況は","待たされること","感覚だけで判断を迫られること","誰かと対立すること","縛られること・ルールが多いこと","突然の予定変更"],
["理想の自分は","周りを引っ張れる人","物事を深く理解している人","みんなに信頼される人","自由な発想を持てる人","コツコツ積み上げられる人"]
];
const TYPES = [
{emoji:"🦁",name:"リーダーライオン",title:"みんなを引っ張るタイプ",bg:"#FAECE7",fg:"#4A1B0C",strengths:["決める力がある","動き出しが早い","頼りにされる"],weaknesses:["せっかちになりやすい","人の話を最後まで聞けないことがある"],advice:"動く前に一呼吸おいて周りの意見を聞くと、もっと頼られる存在になれます。"},
{emoji:"🦉",name:"はかせフクロウ",title:"じっくり考えるタイプ",bg:"#E6F1FB",fg:"#042C53",strengths:["よく考えてから動く","冷静で判断がぶれない","計画づくりが得意"],weaknesses:["考えすぎて動き出すのが遅くなる","気持ちを表に出すのが苦手"],advice:"完璧を待たず「7割できたら動く」を意識すると、もっと力を発揮できます。"},
{emoji:"🐬",name:"なかよしイルカ",title:"みんなを支えるタイプ",bg:"#E1F5EE",fg:"#04342C",strengths:["人の気持ちに寄り添える","場の雰囲気を和ませる","協力するのが得意"],weaknesses:["自分の意見を言うのが苦手","頼まれると断れない"],advice:"たまには自分の気持ちも優先して、「今日は無理」と言う練習をしてみましょう。"},
{emoji:"🦊",name:"ひらめきキツネ",title:"アイデアが得意なタイプ",bg:"#FAEEDA",fg:"#412402",strengths:["発想が自由でユニーク","新しい視点を見つけるのが得意","変化を楽しめる"],weaknesses:["飽きっぽい","計画通りに進めるのが苦手"],advice:"アイデアを形にするために、締め切りやメモを決めて自分をサポートしてあげましょう。"},
{emoji:"🐢",name:"がんばりガメ",title:"コツコツ続けるタイプ",bg:"#EAF3DE",fg:"#173404",strengths:["最後までやり遂げる","真面目でコツコツ努力できる","安定感がある"],weaknesses:["変化が苦手","慎重すぎてチャンスを逃すことがある"],advice:"たまには思い切って新しいことに挑戦すると、あなたの力がもっと広がります。"}
];
let idx = -1; // -1 = cover
const scores = [0,0,0,0,0];
const root = document.getElementById('quiz-root');

function renderCover() {
  root.innerHTML = `
    <div class="cover">
      <div class="cover-emoji-row">
        <span>🦁</span><span>🦉</span><span>🐬</span><span>🦊</span><span>🐢</span>
      </div>
      <p class="cover-title">強み・弱み診断テスト</p>
      <p class="cover-sub">20の質問に答えるだけで、あなたの強みと弱みが5匹の動物キャラクターでわかります。</p>
      <div class="cover-meta">
        <div><div class="num">20問</div><div class="lbl">質問数</div></div>
        <div><div class="num">5タイプ</div><div class="lbl">結果</div></div>
        <div><div class="num">3分</div><div class="lbl">所要時間</div></div>
      </div>
      <button class="start-btn" onclick="startQuiz()">診断をはじめる</button>
    </div>
  `;
}

function startQuiz() { idx = 0; render(); }

function render() {
  if (idx < 0) { renderCover(); return; }
  if (idx < Q.length) {
    const q = Q[idx];
    const pct = Math.round((idx / Q.length) * 100);
    let opts = '';
    for (let i = 1; i < 6; i++) {
      opts += `<button class="option" onclick="answer(${i-1})">${q[i]}</button>`;
    }
    root.innerHTML = `
      <div class="progress-label">質問 ${idx+1} / ${Q.length}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="question">${q[0]}</div>
      <div>${opts}</div>
    `;
    window.scrollTo(0,0);
  } else {
    const max = Math.max(...scores);
    const winner = scores.indexOf(max);
    const t = TYPES[winner];
    const labels = ["ライオン","フクロウ","イルカ","キツネ","カメ"];
    let bars = '';
    for (let i = 0; i < 5; i++) {
      const w = Math.round((scores[i] / Q.length) * 100);
      bars += `
        <div class="score-row">
          <span class="score-label">${labels[i]}</span>
          <div class="score-track"><div class="score-fill" style="width:${w}%"></div></div>
          <span class="score-num">${scores[i]}</span>
        </div>`;
    }
    const sList = t.strengths.map(s => `<li>${s}</li>`).join('');
    const wList = t.weaknesses.map(s => `<li>${s}</li>`).join('');
    root.innerHTML = `
      <div class="result-card" style="background:${t.bg};color:${t.fg}">
        <div class="result-emoji">${t.emoji}</div>
        <p class="result-sub">あなたのタイプ</p>
        <p class="result-name">${t.name}</p>
        <p class="result-title">${t.title}</p>
      </div>
      <div class="section-label">得意なこと</div>
      <ul>${sList}</ul>
      <div class="section-label">苦手なこと</div>
      <ul>${wList}</ul>
      <div class="section-label">アドバイス</div>
      <p class="advice-box">${t.advice}</p>
      <div class="section-label">各タイプの傾向スコア</div>
      ${bars}
      <div class="actions">
        <button onclick="restart()">もう一度診断する</button>
      </div>
    `;
    window.scrollTo(0,0);
  }
}
function answer(i) { scores[i]++; idx++; render(); }
function restart() { idx = -1; for (let i=0;i<5;i++) scores[i]=0; render(); }
render();
</script>
</body>
</html>
